name: 🔄 Update Nitro CLI Version (reusable)

on:
  workflow_call:
    inputs:
      version:
        description: Version to update to.
        required: true
        type: string
      is_stable:
        description: Whether this version is a stable (X.Y.Z) release.
        required: true
        type: boolean
      is_active_major:
        description: Whether this version targets the top lane (version.major >= highest stable major).
        required: true
        type: boolean

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: 🔢 Parse major
        id: ctx
        shell: bash
        run: |
          set -euo pipefail
          V="${{ inputs.version }}"
          MAJOR="${V%%.*}"
          if ! [[ "$MAJOR" =~ ^[0-9]+$ ]]; then
            echo "::error::Cannot parse major from version '$V'"
            exit 1
          fi
          echo "major=$MAJOR" >> "$GITHUB_OUTPUT"

      - name: 🛣️ Resolve lane
        id: lane
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IS_STABLE: ${{ inputs.is_stable }}
          IS_ACTIVE_MAJOR: ${{ inputs.is_active_major }}
          MAJOR: ${{ steps.ctx.outputs.major }}
        run: |
          set -euo pipefail
          REPO="${GITHUB_REPOSITORY}"
          LANE_BRANCH="release/v${MAJOR}"

          if [[ "$IS_ACTIVE_MAJOR" == "true" ]]; then
            # Top lane: work on main; release branch is a mirror updated post-commit.
            CHECKOUT_REF="main"
            MIRROR_RELEASE_BRANCH=true
          else
            # Lower lane: work on release/v${MAJOR}; seed from latest v${MAJOR}.*.* tag if missing.
            MIRROR_RELEASE_BRANCH=false
            if gh api "repos/${REPO}/branches/${LANE_BRANCH}" --silent 2>/dev/null; then
              CHECKOUT_REF="$LANE_BRANCH"
            else
              # Find most recent v${MAJOR}.*.* tag of any kind (stable or pre-release), by semver.
              SEED_TAG=$(gh api --paginate "repos/${REPO}/git/refs/tags/v${MAJOR}." \
                --jq '[.[] | .ref | sub("^refs/tags/"; "")] | .[]?' 2>/dev/null \
                | grep -E "^v${MAJOR}\.[0-9]+\.[0-9]+(-.*)?$" \
                | sort -V \
                | tail -n1 || true)

              if [[ -z "$SEED_TAG" ]]; then
                echo "::error::No release/${LANE_BRANCH} branch and no v${MAJOR}.*.* tag found. Operator must manually create the branch (git branch ${LANE_BRANCH} <commit>) and re-dispatch."
                exit 1
              fi

              echo "Seeding ${LANE_BRANCH} from ${SEED_TAG}."
              SEED_SHA=$(gh api "repos/${REPO}/git/refs/tags/${SEED_TAG}" --jq '.object.sha')
              # Tag may be annotated; resolve to commit SHA.
              OBJ_TYPE=$(gh api "repos/${REPO}/git/refs/tags/${SEED_TAG}" --jq '.object.type')
              if [[ "$OBJ_TYPE" == "tag" ]]; then
                SEED_SHA=$(gh api "repos/${REPO}/git/tags/${SEED_SHA}" --jq '.object.sha')
              fi
              gh api "repos/${REPO}/git/refs" -f "ref=refs/heads/${LANE_BRANCH}" -f "sha=${SEED_SHA}" >/dev/null
              CHECKOUT_REF="$LANE_BRANCH"
            fi
          fi

          echo "checkout_ref=$CHECKOUT_REF" >> "$GITHUB_OUTPUT"
          echo "lane_branch=$LANE_BRANCH" >> "$GITHUB_OUTPUT"
          echo "mirror_release_branch=$MIRROR_RELEASE_BRANCH" >> "$GITHUB_OUTPUT"

      - name: 📥 Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.lane.outputs.checkout_ref }}
          fetch-depth: 0

      - name: 🧰 Enable Corepack
        run: |
          corepack enable
          corepack prepare yarn@4.2.2 --activate
          yarn --version

      - name: 🧰 Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: yarn
          cache-dependency-path: yarn.lock

      - name: 📦 Install dependencies
        run: yarn install --immutable

      - name: 📝 Update version in package.json
        run: npm version "${{ inputs.version }}" --no-git-tag-version

      - name: 📝 Update README band
        shell: bash
        env:
          MAJOR: ${{ steps.ctx.outputs.major }}
        run: |
          set -euo pipefail
          if [[ ! -f README.md ]]; then
            echo "No README.md to rewrite."
            exit 0
          fi
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          # In-place rewrite of `uses: ChilliCream/<repo>@vN` → `uses: ChilliCream/<repo>@v${MAJOR}`.
          sed -i -E "s|(uses: ChilliCream/${REPO_NAME}@v)[0-9]+|\1${MAJOR}|g" README.md

      - name: 🏗️ Build
        run: yarn build

      - name: 📤 Commit (verified)
        id: commit
        uses: ChilliCream/create-signed-commit@75b38ccd01b93548dd2fa458e533b62015ecf35c
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          commit_message: "Update Nitro CLI to ${{ inputs.version }}"

      - name: 🪞 Mirror release branch (top lane)
        if: steps.lane.outputs.mirror_release_branch == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LANE_BRANCH: ${{ steps.lane.outputs.lane_branch }}
          NEW_SHA: ${{ steps.commit.outputs.sha || github.sha }}
        run: |
          set -euo pipefail
          REPO="${GITHUB_REPOSITORY}"
          if gh api "repos/${REPO}/git/refs/heads/${LANE_BRANCH}" --silent 2>/dev/null; then
            gh api -X PATCH "repos/${REPO}/git/refs/heads/${LANE_BRANCH}" \
              -f "sha=${NEW_SHA}" -F "force=true" >/dev/null
            echo "Force-set ${LANE_BRANCH} to ${NEW_SHA}."
          else
            gh api "repos/${REPO}/git/refs" \
              -f "ref=refs/heads/${LANE_BRANCH}" -f "sha=${NEW_SHA}" >/dev/null
            echo "Created ${LANE_BRANCH} at ${NEW_SHA}."
          fi

      - name: 🏷️ Tag full version
        uses: ChilliCream/create-signed-tag@28005302dd79bafbecdb0ad7c1daf2de2b795a39
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          tag: v${{ inputs.version }}
          sha: ${{ steps.commit.outputs.sha || github.sha }}

      - name: 🏷️ Tag major version
        if: inputs.is_stable
        uses: ChilliCream/create-signed-tag@28005302dd79bafbecdb0ad7c1daf2de2b795a39
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          tag: v${{ steps.ctx.outputs.major }}
          sha: ${{ steps.commit.outputs.sha || github.sha }}

      - name: 🚀 Create GitHub release
        if: inputs.is_stable
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          TAG="v${{ inputs.version }}"

          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists. Skipping creation."
            exit 0
          fi

          gh release create "$TAG" \
            --title "$TAG" \
            --verify-tag
